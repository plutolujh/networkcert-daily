<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
  <meta name="theme-color" content="#2563eb">
  <title>案例分析专项 - 备考系统</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #dc2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    header .subtitle {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.25rem 1rem;
    }

    /* 年份选择 */
    .year-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .year-tab {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .year-tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .year-tab:hover:not(.active) {
      background: #e2e8f0;
    }

    /* 题目卡片 */
    .question-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .question-num {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--primary);
    }
    .question-tags {
      display: flex;
      gap: 0.5rem;
    }
    .tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: #dbeafe;
      color: #1d4ed8;
    }

    .question-content {
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 1rem;
    }
    .question-content p {
      margin-bottom: 0.75rem;
    }

    /* 子问题 */
    .sub-questions {
      margin-top: 1rem;
    }
    .sub-q {
      margin-bottom: 1rem;
      padding: 1rem;
      background: #f8fafc;
      border-radius: 8px;
      border-left: 3px solid var(--primary);
    }
    .sub-q-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .sub-q-content {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    /* 答题区域 */
    .answer-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 2px solid var(--border);
    }
    .answer-section h3 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .answer-textarea {
      width: 100%;
      min-height: 120px;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      margin-bottom: 1rem;
    }
    .answer-textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* 按钮 */
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    .btn-secondary {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: #e2e8f0;
    }

    /* 结果显示 */
    .result-section {
      margin-top: 1.5rem;
      padding: 1.5rem;
      border-radius: 8px;
      display: none;
    }
    .result-section.show {
      display: block;
    }
    .result-correct {
      background: #dcfce7;
      border: 1px solid #86efac;
    }
    .result-wrong {
      background: #fef2f2;
      border: 1px solid #fca5a5;
    }
    .result-answer {
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .result-explanation {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    /* 导航按钮 */
    .nav-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .nav-buttons .btn {
      flex: 1;
      text-align: center;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }
    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* 底部信息 */
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
    .version-info {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .version-info p {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin: 0.25rem 0;
    }

    @media (max-width: 480px) {
      .question-card {
        padding: 1rem;
      }
      .nav-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

    let currentYear = '2024';
    let currentQuestionIndex = 0;
    let userAnswers = {};

    function renderQuestionList() {
      const container = document.getElementById('questionList');
      const questions = caseData[currentYear] || [];

      if (questions.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📚</div>
            <p>暂无${currentYear}年真题</p>
          </div>
        `;
        document.getElementById('navButtons').style.display = 'none';
        return;
      }

      const q = questions[currentQuestionIndex];

      container.innerHTML = `
        <div class="question-card">
          <div class="question-header">
            <span class="question-num">${q.num}：${q.title}</span>
            <div class="question-tags">
              ${q.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
          </div>

          <div class="question-content">
            <p>${q.content}</p>
          </div>

          <div class="sub-questions">
            ${q.subQuestions.map((sq, idx) => `
              <div class="sub-q">
                <div class="sub-q-title">${sq.q}（${(idx + 1)}/${q.subQuestions.length}）</div>
                <div class="sub-q-content">${sq.desc}</div>
              </div>
            `).join('')}
          </div>

          <div class="answer-section">
            <h3>📝 我的答案</h3>
            <textarea class="answer-textarea" id="answerInput" placeholder="请输入您的答案...">${userAnswers[q.id] || ''}</textarea>
            <button class="btn btn-primary" onclick="checkAnswer()">提交答案</button>
          </div>

          <div class="result-section" id="resultSection">
            <div class="result-answer">参考答案：</div>
            <div class="result-explanation"></div>
          </div>
        </div>
      `;

      document.getElementById('navButtons').style.display = 'flex';
      updateNavButtons();
    }

    function updateNavButtons() {
      const questions = caseData[currentYear] || [];
      document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
      document.getElementById('nextBtn').disabled = currentQuestionIndex >= questions.length - 1;
    }

    function checkAnswer() {
      const questions = caseData[currentYear];
      const q = questions[currentQuestionIndex];
      const input = document.getElementById('answerInput');
      userAnswers[q.id] = input.value;

      const resultSection = document.getElementById('resultSection');
      resultSection.classList.add('show');
      resultSection.querySelector('.result-answer').textContent = '参考答案：' + q.answer;
      resultSection.querySelector('.result-explanation').innerHTML = q.explanation;
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 年份切换
      document.querySelectorAll('.year-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentYear = tab.dataset.year;
          currentQuestionIndex = 0;
          userAnswers = {};
          renderQuestionList();
        });
      });

      // 导航按钮
      document.getElementById('prevBtn').addEventListener('click', () => {
        if (currentQuestionIndex > 0) {
          currentQuestionIndex--;
          renderQuestionList();
        }
      });

      document.getElementById('nextBtn').addEventListener('click', () => {
        const questions = caseData[currentYear] || [];
        if (currentQuestionIndex < questions.length - 1) {
          currentQuestionIndex++;
          renderQuestionList();
        }
      });

      renderQuestionList();
    });
  </script>
