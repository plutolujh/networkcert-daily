<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
  <meta name="theme-color" content="#2563eb">
  <title>案例分析专项 - 备考系统</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #dc2626;
    }
    .grading-status.correct { background: var(--success); color: white; }
    .grading-status.partial { background: var(--warning); color: white; }
    .grading-status.wrong { background: var(--error); color: white; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    header .subtitle {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.25rem 1rem;
    }

    /* 年份选择 */
    .year-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .year-tab {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .year-tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .year-tab:hover:not(.active) {
      background: #e2e8f0;
    }

    /* 题目卡片 */
    .question-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .question-num {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--primary);
    }
    .question-tags {
      display: flex;
      gap: 0.5rem;
    }
    .tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: #dbeafe;
      color: #1d4ed8;
    }

    .question-content {
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 1rem;
    }
    .question-content p {
      margin-bottom: 0.75rem;
    }

    /* 子问题 */
    .sub-questions {
      margin-top: 1rem;
    }
    .sub-q {
      margin-bottom: 1rem;
      padding: 1rem;
      background: #f8fafc;
      border-radius: 8px;
      border-left: 3px solid var(--primary);
    }
    .sub-q-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .sub-q-content {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    /* 答题区域 */
    .answer-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 2px solid var(--border);
    }
    .answer-section h3 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .answer-textarea {
      width: 100%;
      min-height: 120px;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      margin-bottom: 1rem;
    }
    .answer-textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* 按钮 */
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    .btn-secondary {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: #e2e8f0;
    }

    /* 结果显示 */
    .result-section {
      margin-top: 1.5rem;
      padding: 1.5rem;
      border-radius: 8px;
      display: none;
    }
    .result-section.show {
      display: block;
    }
    .result-correct {
      background: #dcfce7;
      border: 1px solid #86efac;
    }
    .result-wrong {
      background: #fef2f2;
      border: 1px solid #fca5a5;
    }
    .result-answer {
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .result-explanation {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    /* 批改结果样式 */
    .grading-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 2px solid var(--border);
    }
    .grading-section h3 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .grading-item {
      background: #f8fafc;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      border-left: 3px solid var(--border);
    }
    .grading-item.correct {
      border-left-color: var(--success);
      background: #dcfce7;
    }
    .grading-item.partial {
      border-left-color: var(--warning);
      background: #fef3c7;
    }
    .grading-item.wrong {
      border-left-color: var(--error);
      background: #fef2f2;
    }
    .grading-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .grading-title {
      font-weight: 600;
      color: var(--text);
    }
    .grading-status {
      font-size: 0.85rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-weight: 500;
    }
    .grading-status.correct { background: var(--success); color: white; }
    .grading-status.partial { background: var(--warning); color: white; }
    .grading-status.wrong { background: var(--error); color: white; }
    .grading-detail {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .grading-detail li {
      margin: 0.25rem 0;
    }
    .key-check { color: var(--success); margin-right: 0.3rem; }
    .key-miss { color: var(--error); margin-right: 0.3rem; }
    .key-partial { color: var(--warning); margin-right: 0.3rem; }

    .sub-answers {
      margin: 1rem 0;
    }
    .sub-answer-item {
      padding: 0.75rem;
      background: #f1f5f9;
      border-radius: 6px;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    /* 导航按钮 */
    .nav-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .nav-buttons .btn {
      flex: 1;
      text-align: center;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }
    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* 底部信息 */
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
    .version-info {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .version-info p {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin: 0.25rem 0;
    }

    @media (max-width: 480px) {
      .question-card {
        padding: 1rem;
      }
      .nav-buttons {
        flex-direction: column;
      }
    }
    .save-success {
      color: var(--success);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }
    .save-success.show {
      display: block;
    }
    .grading-container {
      margin-top: 1rem;
    }
    .key-check { color: var(--success); margin-right: 0.3rem; }
    .key-miss { color: var(--error); margin-right: 0.3rem; }
    .key-partial { color: var(--warning); margin-right: 0.3rem; }
  </style>
</head>
<body>
  <header>
    <h1>📝 案例分析专项</h1>
    <div class="subtitle">2015-2024年真题训练</div>
  </header>

  <main>
    <!-- 年份选择 -->
    <div class="year-tabs" id="yearTabs">
      <button class="year-tab active" data-year="2024">2024年</button>
      <button class="year-tab" data-year="2023">2023年</button>
      <button class="year-tab" data-year="2022">2022年</button>
      <button class="year-tab" data-year="2021">2021年</button>
      <button class="year-tab" data-year="2020">2020年</button>
    </div>

    <!-- 题目列表 -->
    <div id="questionList">
      <div class="loading">加载中...</div>
    </div>

    <!-- 导航按钮 -->
    <div class="nav-buttons" id="navButtons" style="display: none;">
      <button class="btn btn-secondary" id="prevBtn">上一题</button>
      <button class="btn btn-primary" id="nextBtn">下一题</button>
    </div>
  </main>

  <div class="footer">
    <div class="footer-links">
      <a href="index.html">返回首页</a>
      <a href="daily.html">每日一题</a>
      <a href="outline.html">考试大纲</a>
    </div>
    <div class="version-info">
      <p>v1.0.1 | 2026-05-31</p>
      <p class="changelog">新增：案例分析专项页面</p>
    </div>
  </div>

  <style>
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }
    .footer-links a {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .footer-links a:hover {
      text-decoration: underline;
    }
    .changelog {
      font-size: 0.7rem !important;
      color: var(--text-secondary);
      opacity: 0.8;
    }
  </style>

  <script>
    const API_BASE = 'https://netcert.hao123456.cn/api';
    let currentYear = '2024';
    let currentQuestionIndex = 0;
    let userAnswers = {};
    let caseQuestions = [];  // 从API加载的题目数据
    let isLoading = false;

    // 加载题目数据从API
    async function loadQuestions() {
      try {
        isLoading = true;
        const res = await fetch(`${API_BASE}/case/questions?year=${currentYear}`);
        const data = await res.json();
        caseQuestions = data;
        currentQuestionIndex = 0;
        renderQuestionList();
      } catch (err) {
        console.error('加载题目失败:', err);
        document.getElementById('questionList').innerHTML = '<div class="error">加载题目失败，请刷新重试</div>';
      } finally {
        isLoading = false;
      }
    }

    function renderQuestionList() {
      const container = document.getElementById('questionList');

      if (isLoading) {
        container.innerHTML = '<div class="loading">加载中...</div>';
        document.getElementById('navButtons').style.display = 'none';
        return;
      }

      if (caseQuestions.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📚</div>
            <p>暂无${currentYear}年真题</p>
          </div>
        `;
        document.getElementById('navButtons').style.display = 'none';
        return;
      }

      const q = caseQuestions[currentQuestionIndex];
      const tags = q.tags ? q.tags.split(',') : [];

      container.innerHTML = `
        <div class="question-card">
          <div class="question-header">
            <span class="question-num">${q.num}：${q.title}</span>
            <div class="question-tags">
              ${tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
          </div>

          <div class="question-content">
            <p>${q.content}</p>
          </div>

          <div class="sub-questions">
            ${q.subQuestions.results.map((sq, idx) => `
              <div class="sub-q">
                <div class="sub-q-title">问题${sq.sub_num}（${(idx + 1)}/${q.subQuestions.results.length}）</div>
                <div class="sub-q-content">${sq.question}</div>
              </div>
            `).join('')}
          </div>

          <div class="answer-section">
            <h3>📝 我的答案</h3>
            <textarea class="answer-textarea" id="answerInput" placeholder="请输入您的答案..."></textarea>
            <button class="btn btn-primary" onclick="checkAnswer()">提交答案</button>
          </div>

          <div class="result-section" id="resultSection">
            <div class="result-answer">参考答案：</div>
            <div class="result-explanation"></div>
          </div>
          <div class="grading-container" id="gradingContainer"></div>
          <div class="save-success" id="saveSuccess">✓ 答案已保存</div>
        </div>
      `;

      document.getElementById('navButtons').style.display = 'flex';
      updateNavButtons();
    }

    function updateNavButtons() {
      document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
      document.getElementById('nextBtn').disabled = currentQuestionIndex >= caseQuestions.length - 1;
    }

    async function checkAnswer() {
      const q = caseQuestions[currentQuestionIndex];
      const input = document.getElementById('answerInput');
      const answerText = input.value;
      userAnswers[q.id] = answerText;

      // 清空之前的结果
      document.getElementById('resultSection').classList.remove('show');
      document.getElementById('resultSection').querySelector('.result-answer').textContent = '参考答案：';
      document.getElementById('resultSection').querySelector('.result-explanation').innerHTML = '';
      document.getElementById('gradingContainer').innerHTML = '';

      // 显示参考答案和批改结果
      let answerHTML = '';
      let gradingHTML = `<div class="grading-section"><h3>📋 批改结果</h3>`;

      let totalScore = 0;
      let maxScore = 0;

      for (const sq of q.subQuestions.results) {
        const keywords = sq.keywords.split(',');
        const matched = [];
        const missing = [];

        for (const kw of keywords) {
          if (answerText.includes(kw)) {
            matched.push(kw);
          } else {
            missing.push(kw);
          }
        }

        const score = matched.length;
        const required = sq.required_count || 4;
        maxScore += keywords.length;
        totalScore += score;

        let status, statusLabel;
        if (score >= required) {
          status = score >= keywords.length * 0.7 ? 'correct' : 'partial';
          statusLabel = score >= keywords.length * 0.7 ? '✓ 正确' : '⚠ 部分正确';
        } else if (score >= required * 0.5) {
          status = 'partial';
          statusLabel = '⚠ 部分正确';
        } else {
          status = 'wrong';
          statusLabel = '✗ 错误';
        }

        // 添加参考答案
        answerHTML += `<div class="sub-answer-item"><strong>问题${sq.sub_num}：</strong><pre style="white-space:pre-wrap;margin-top:0.5rem;">${sq.standard_answer}</pre></div>`;

        // 添加批改结果
        let detailHTML = '';
        if (matched.length > 0) {
          detailHTML += `<div style="margin-bottom:0.3rem;"><span class="key-check">✓</span> 已提及：${matched.slice(0, 5).join('、')}${matched.length > 5 ? '...' : ''}</div>`;
        }
        if (missing.length > 0) {
          detailHTML += `<div><span class="key-miss">✗</span> 缺少：${missing.slice(0, 5).join('、')}${missing.length > 5 ? '...' : ''}</div>`;
        }

        gradingHTML += `
          <div class="grading-item ${status}">
            <div class="grading-header">
              <span class="grading-title">问题${sq.sub_num}</span>
              <span class="grading-status ${status}">${statusLabel}</span>
            </div>
            <div class="grading-detail">
              ${detailHTML}
              <div style="margin-top:0.3rem;font-size:0.8rem;color:#64748b;">得分：${score}/${keywords.length}（需至少${required}个关键词）</div>
            </div>
          </div>
        `;

        // 保存到数据库
        const gradeResult = { score, matched, missing, status, required };
        await fetch(`${API_BASE}/case/submit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question_id: q.id,
            sub_num: sq.sub_num,
            user_answer: answerText,
            grade_result: gradeResult
          })
        });
      }

      gradingHTML += `</div>`;

      // 显示结果
      const resultSection = document.getElementById('resultSection');
      resultSection.classList.add('show');
      resultSection.querySelector('.result-answer').textContent = `参考答案：`;
      resultSection.querySelector('.result-explanation').innerHTML = answerHTML;
      document.getElementById('gradingContainer').innerHTML = gradingHTML;

      // 显示保存成功
      const saveSuccess = document.getElementById('saveSuccess');
      saveSuccess.textContent = '✓ 答案已保存到数据库';
      saveSuccess.classList.add('show');
      setTimeout(() => saveSuccess.classList.remove('show'), 3000);
    }
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 年份切换
      document.querySelectorAll('.year-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentYear = tab.dataset.year;
          loadQuestions();
        });
      });

      // 导航按钮
      document.getElementById('prevBtn').addEventListener('click', () => {
        if (currentQuestionIndex > 0) {
          currentQuestionIndex--;
          renderQuestionList();
        }
      });

      document.getElementById('nextBtn').addEventListener('click', () => {
        if (currentQuestionIndex < caseQuestions.length - 1) {
          currentQuestionIndex++;
          renderQuestionList();
        }
      });

      // 初始加载题目
      loadQuestions();
    });
  </script>
</body>
</html>
